<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1180" viewBox="0 0 1400 1180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8fc"/>
      <stop offset="100%" stop-color="#e8f0f8"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#143b63"/>
      <stop offset="100%" stop-color="#2563a6"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="1180" fill="url(#bg)"/>
  <rect x="48" y="36" width="1304" height="164" rx="28" fill="url(#hero)"/>
  <text x="88" y="95" font-size="18" fill="#d9e9fb">Proposal Review Audit</text>
  <text x="88" y="136" font-size="34" font-weight="700" fill="#ffffff">江苏省高校图工委教改申请书评审审计报告</text>
  <text x="88" y="172" font-size="19" fill="#d9e9fb">对象：AI 驱动的未来学习中心智慧学习服务模式创新与实践研究</text>
  <rect x="1110" y="70" width="180" height="96" rx="22" fill="#ffffff" opacity="0.14"/>
  <text x="1200" y="107" text-anchor="middle" font-size="16" fill="#d9e9fb">综合评分</text>
  <text x="1200" y="147" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">76</text>

  <rect x="48" y="228" width="620" height="360" rx="24" fill="#ffffff"/>
  <text x="84" y="272" font-size="24" font-weight="700" fill="#17324d">维度评分</text>

  <text x="84" y="320" font-size="16" fill="#17324d">选题契合度</text>
  <rect x="204" y="306" rx="8" ry="8" width="260" height="14" fill="#dbe7f3"/>
  <rect x="204" y="306" rx="8" ry="8" width="229" height="14" fill="#1976d2"/>
  <text x="476" y="320" text-anchor="end" font-size="15" fill="#17324d">88</text>

  <text x="84" y="362" font-size="16" fill="#17324d">教改问题与价值</text>
  <rect x="204" y="348" rx="8" ry="8" width="260" height="14" fill="#dbe7f3"/>
  <rect x="204" y="348" rx="8" ry="8" width="218" height="14" fill="#1976d2"/>
  <text x="476" y="362" text-anchor="end" font-size="15" fill="#17324d">84</text>

  <text x="84" y="404" font-size="16" fill="#17324d">创新性与辨识度</text>
  <rect x="204" y="390" rx="8" ry="8" width="260" height="14" fill="#dbe7f3"/>
  <rect x="204" y="390" rx="8" ry="8" width="224" height="14" fill="#1976d2"/>
  <text x="476" y="404" text-anchor="end" font-size="15" fill="#17324d">86</text>

  <text x="84" y="446" font-size="16" fill="#17324d">实施路径与保障</text>
  <rect x="204" y="432" rx="8" ry="8" width="260" height="14" fill="#dbe7f3"/>
  <rect x="204" y="432" rx="8" ry="8" width="192" height="14" fill="#f59e0b"/>
  <text x="476" y="446" text-anchor="end" font-size="15" fill="#17324d">74</text>

  <text x="84" y="488" font-size="16" fill="#17324d">研究基础与团队准备度</text>
  <rect x="204" y="474" rx="8" ry="8" width="260" height="14" fill="#dbe7f3"/>
  <rect x="204" y="474" rx="8" ry="8" width="164" height="14" fill="#d14343"/>
  <text x="476" y="488" text-anchor="end" font-size="15" fill="#17324d">63</text>

  <text x="84" y="530" font-size="16" fill="#17324d">预期成果与推广价值</text>
  <rect x="204" y="516" rx="8" ry="8" width="260" height="14" fill="#dbe7f3"/>
  <rect x="204" y="516" rx="8" ry="8" width="198" height="14" fill="#f59e0b"/>
  <text x="476" y="530" text-anchor="end" font-size="15" fill="#17324d">76</text>

  <text x="84" y="572" font-size="16" fill="#17324d">合规性与申报完整度</text>
  <rect x="204" y="558" rx="8" ry="8" width="260" height="14" fill="#dbe7f3"/>
  <rect x="204" y="558" rx="8" ry="8" width="151" height="14" fill="#d14343"/>
  <text x="476" y="572" text-anchor="end" font-size="15" fill="#17324d">58</text>

  <rect x="700" y="228" width="652" height="360" rx="24" fill="#ffffff"/>
  <text x="736" y="272" font-size="24" font-weight="700" fill="#17324d">江苏专项门槛检查</text>
  <rect x="736" y="295" width="560" height="2" fill="#dbe7f3"/>

  <circle cx="750" cy="331" r="4" fill="#1976d2"/>
  <text x="764" y="336" font-size="16" fill="#17324d">选题与 2026 热点方向高度匹配，门槛通过。</text>
  <circle cx="750" cy="369" r="4" fill="#1976d2"/>
  <text x="764" y="374" font-size="16" fill="#17324d">“实施路径完整” 已有框架，但保障证据还不够硬。</text>
  <circle cx="750" cy="407" r="4" fill="#1976d2"/>
  <text x="764" y="412" font-size="16" fill="#17324d">配套经费目前只有建议写法，尚未形成明确承诺。</text>
  <circle cx="750" cy="445" r="4" fill="#1976d2"/>
  <text x="764" y="450" font-size="16" fill="#17324d">重点 / 一般类别建议优先报一般课题，更稳。</text>
  <circle cx="750" cy="483" r="4" fill="#1976d2"/>
  <text x="764" y="488" font-size="16" fill="#17324d">主持人资格、未结项情况、事实数据填报情况待补证。</text>
  <circle cx="750" cy="521" r="4" fill="#1976d2"/>
  <text x="764" y="526" font-size="16" fill="#17324d">材料完整度不足，当前仍是框架稿，不宜直接送审。</text>

  <rect x="48" y="616" width="412" height="408" rx="24" fill="#ffffff"/>
  <text x="84" y="660" font-size="24" font-weight="700" fill="#17324d">主要优势</text>
  <circle cx="96" cy="701" r="4" fill="#1f9d55"/>
  <text x="110" y="706" font-size="16" fill="#17324d">题目与江苏 2026 通知契合度高，方向基本站对。</text>
  <circle cx="96" cy="745" r="4" fill="#1f9d55"/>
  <text x="110" y="750" font-size="16" fill="#17324d">把“智能体”写成学习支持服务改革，而不是纯技术建设。</text>
  <circle cx="96" cy="789" r="4" fill="#1f9d55"/>
  <text x="110" y="794" font-size="16" fill="#17324d">实施阶段划分清楚，具备后续试点扩展空间。</text>

  <rect x="494" y="616" width="412" height="408" rx="24" fill="#ffffff"/>
  <text x="530" y="660" font-size="24" font-weight="700" fill="#17324d">主要风险</text>
  <circle cx="542" cy="701" r="4" fill="#d14343"/>
  <text x="556" y="706" font-size="16" fill="#17324d">主持人、团队、成果、资质等硬信息仍未补齐。</text>
  <circle cx="542" cy="745" r="4" fill="#d14343"/>
  <text x="556" y="750" font-size="16" fill="#17324d">研究基础与条件保障还停留在合理推断，不是证据级表述。</text>
  <circle cx="542" cy="789" r="4" fill="#d14343"/>
  <text x="556" y="794" font-size="16" fill="#17324d">江苏硬门槛项中，经费承诺与资格核查尚未落地。</text>

  <rect x="940" y="616" width="412" height="408" rx="24" fill="#ffffff"/>
  <text x="976" y="660" font-size="24" font-weight="700" fill="#17324d">优先改进动作</text>
  <circle cx="988" cy="701" r="4" fill="#f59e0b"/>
  <text x="1002" y="706" font-size="16" fill="#17324d">先补齐主持人、成员、成果、职称、联系方式等实名信息。</text>
  <circle cx="988" cy="745" r="4" fill="#f59e0b"/>
  <text x="1002" y="750" font-size="16" fill="#17324d">把配套经费、馆内支持、协同条件写成明确承诺。</text>
  <circle cx="988" cy="789" r="4" fill="#f59e0b"/>
  <text x="1002" y="794" font-size="16" fill="#17324d">补一段“前期基础证据”，把能做成这件事讲实。</text>

  <rect x="48" y="1052" width="1304" height="86" rx="22" fill="#12314e"/>
  <text x="84" y="1086" font-size="16" fill="#d9e9fb">方法来源：江苏省高校图工委 2026 申报通知；Nature grant review systematic review；高校教改项目管理办法与 rubric 经验</text>
  <text x="84" y="1114" font-size="15" fill="#b8d0e8">生成日期：2026-04-23  ·  适用场景：江苏省高校图工委教改课题 / 高校教改申请书审计</text>
</svg>
